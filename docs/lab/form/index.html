<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form</title>
  </head>
  <body>
    <div>
      <input type="text" name="text1" enterkeyhint="next" />
    </div>
    <div>
      <input type="text" name="text2" enterkeyhint="previous" />
    </div>
    <div>
      <input type="search" name="search" enterkeyhint="search" />
    </div>
    <div>
      <textarea name="textarea" enterkeyhint="enter"></textarea>
    </div>
    <div>
      <input type="text" name="text3" enterkeyhint="go" />
      <button enterkeyhint="go">go</button>
    </div>
    <div>
      <input type="text" name="text4" enterkeyhint="done" />
      <button enterkeyhint="done">send</button>
    </div>
    <div>
      <input type="text" name="text5" enterkeyhint="send" />
      <button enterkeyhint="send">send</button>
    </div>
  </body>
</html>
